<!DOCTYPE html>
<html lang="en">
<head>
  <title>Academic Performance Analyzer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>🎓 Academic Performance Analyzer</h1>

  <!-- SUBJECT WISE -->
  <div class="section">
    <h2>1. Subject-wise Percentage & CGPA</h2>

    <div id="subjectInputs">
      <div class="row">
        <input type="number" class="obtained" placeholder="Obtained Marks" min="0">
        <button class="delete-btn" onclick="deleteSubject(this)">Delete</button>
      </div>
    </div>

    <button onclick="addSubject()">Add Subject ➕</button>
    <button onclick="showTotalMarksInput()">Next ➡️</button>

    <div id="totalMarksContainer">
      <input type="number" id="totalMaxMarks" placeholder="Total Maximum Marks">
      <button onclick="calculatePercentage()">Calculate</button>
      <button onclick="resetCalculator()">Reset 🔄</button>
    </div>

    <div id="result1"></div>
  </div>

  <!-- SEMESTER WISE -->
  <div class="section">
    <h2>2. Semester-wise CGPA Calculator</h2>

    <div id="semesterInputs">
      <div class="row">
        <input type="number" class="semesterPercent" placeholder="Semester Percentage" min="0" max="100">
        <button class="delete-btn" onclick="deleteSemester(this)">Delete</button>
      </div>
    </div>

    <button onclick="addSemester()">Add Semester ➕</button>
    <button onclick="calculateSemesterCGPA()">Calculate</button>

    <div id="result2"></div>
  </div>

  

</div>

<script src="script.js"></script>
</body>
</html>
